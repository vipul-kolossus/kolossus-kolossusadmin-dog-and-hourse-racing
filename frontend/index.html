<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeBet Pro - Dog &amp; Horse Racing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    .app { min-height: 100vh; }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 64px;
      box-shadow: 0 2px 20px rgba(0,0,0,.3); position: sticky; top: 0; z-index: 100;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 28px; }
    .header-title { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .header-title span { color: #f72585; }
    .live-badge {
      background: #f72585; color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    .header-stats { display: flex; gap: 20px; }
    .hstat { text-align: center; }
    .hstat-v { font-size: 18px; font-weight: 700; color: #7b2ff7; }
    .hstat-l { font-size: 10px; color: rgba(255,255,255,.6); text-transform: uppercase; }
    .stats-bar {
      background: #fff; border-bottom: 1px solid #e8ecf0;
      padding: 12px 24px; display: flex; gap: 32px; overflow-x: auto;
    }
    .stat-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .stat-icon { font-size: 18px; }
    .stat-info { display: flex; flex-direction: column; }
    .stat-value { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .3px; }
    .main-layout { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 120px); }
    .races-panel { padding: 20px; overflow-y: auto; }
    .betslip-panel {
      background: #fff; border-left: 1px solid #e8ecf0;
      position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto;
    }
    .tabs {
      display: flex; gap: 8px; margin-bottom: 20px; background: #fff;
      padding: 6px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); width: fit-content;
    }
    .tab-btn {
      padding: 8px 20px; border: none; background: transparent; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; color: #6b7280; transition: all .2s; font-family: inherit;
    }
    .tab-btn:hover { background: #f3f4f6; color: #1a1a2e; }
    .tab-btn.active {
      background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #fff;
      box-shadow: 0 2px 8px rgba(15,52,96,.3);
    }
    .race-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .race-card {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.08); cursor: pointer;
      transition: transform .2s, box-shadow .2s; border: 1px solid #e8ecf0;
    }
    .race-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .race-card-header {
      padding: 16px; display: flex; justify-content: space-between;
      align-items: flex-start; border-bottom: 1px solid #f3f4f6;
    }
    .type-badge {
      display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px; background: #f3f4f6; color: #374151;
    }
    .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
    .status-live { background: #fef2f2; color: #dc2626; animation: pulse 1.5s infinite; }
    .status-upcoming { background: #fef3c7; color: #d97706; }
    .status-finished { background: #f3f4f6; color: #6b7280; }
    .race-card-body { padding: 16px; }
    .race-name { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .race-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .meta-item { font-size: 12px; color: #6b7280; }
    .race-card-footer {
      padding: 12px 16px; background: #f9fafb;
      display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f3f4f6;
    }
    .prize { font-size: 13px; font-weight: 700; color: #059669; }
    .view-btn {
      font-size: 12px; font-weight: 600; color: #0f3460; background: none;
      border: 1px solid #0f3460; padding: 5px 14px; border-radius: 8px; cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .view-btn:hover { background: #0f3460; color: #fff; }
    .race-detail { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .detail-header { background: linear-gradient(135deg, #1a1a2e, #0f3460); padding: 20px 24px; color: #fff; }
    .back-btn {
      background: rgba(255,255,255,.15); border: none; color: #fff; padding: 6px 14px;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 12px; transition: background .2s; font-family: inherit;
    }
    .back-btn:hover { background: rgba(255,255,255,.25); }
    .detail-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .detail-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px; opacity: .85; }
    .ptable { width: 100%; border-collapse: collapse; }
    .ptable th {
      background: #f9fafb; padding: 12px 16px; text-align: left;
      font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase;
      border-bottom: 2px solid #e8ecf0;
    }
    .ptable td { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .ptable tr:hover td { background: #f9fafb; }
    .pnum {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; background: #1a1a2e; color: #fff;
      border-radius: 50%; font-size: 12px; font-weight: 700;
    }
    .pname { font-weight: 600; color: #1a1a2e; }
    .odds { font-size: 16px; font-weight: 800; color: #f72585; }
    .form { font-size: 12px; color: #6b7280; font-family: monospace; }
    .bet-btn {
      background: linear-gradient(135deg, #f72585, #7b2ff7); color: #fff; border: none;
      padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700;
      transition: opacity .2s; font-family: inherit;
    }
    .bet-btn:hover { opacity: .85; }
    .bet-slip { padding: 16px; }
    .bs-title {
      font-size: 16px; font-weight: 800; color: #1a1a2e; padding-bottom: 12px;
      border-bottom: 2px solid #f3f4f6; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .bet-cnt {
      background: #f72585; color: #fff; font-size: 11px; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    }
    .bet-item {
      background: #f9fafb; border: 1px solid #e8ecf0; border-radius: 10px; padding: 12px; margin-bottom: 10px;
    }
    .bi-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .bi-pname { font-size: 14px; font-weight: 700; color: #1a1a2e; }
    .bi-race { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .rm-btn { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 18px; line-height: 1; }
    .rm-btn:hover { color: #ef4444; }
    .bi-odds { font-size: 18px; font-weight: 800; color: #f72585; margin-bottom: 10px; }
    .btype-sel {
      width: 100%; padding: 7px 10px; border: 1px solid #e8ecf0; border-radius: 8px;
      font-size: 13px; margin-bottom: 8px; background: #fff; color: #374151; font-family: inherit;
    }
    .bamount {
      width: 100%; padding: 7px 10px; border: 1px solid #e8ecf0; border-radius: 8px;
      font-size: 13px; color: #374151; margin-bottom: 8px; font-family: inherit;
    }
    .bamount:focus { outline: none; border-color: #0f3460; }
    .quick-btns { display: flex; gap: 4px; margin-bottom: 8px; }
    .qbtn {
      padding: 5px 8px; border: 1px solid #e8ecf0; background: #fff;
      border-radius: 6px; font-size: 11px; font-weight: 600; color: #374151; cursor: pointer; font-family: inherit;
    }
    .qbtn:hover { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .pot-win { font-size: 12px; color: #059669; font-weight: 600; margin-bottom: 10px; }
    .place-btn {
      width: 100%; background: linear-gradient(135deg, #059669, #10b981); color: #fff; border: none;
      padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .place-btn:hover { opacity: .9; }
    .empty-bs { text-align: center; padding: 40px 20px; color: #9ca3af; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .loading { display: flex; justify-content: center; align-items: center; padding: 60px; flex-direction: column; gap: 16px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #e8ecf0; border-top-color: #0f3460;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .notif {
      position: fixed; top: 80px; right: 20px; padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 600; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,.15);
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
    .notif-success { background: #059669; color: #fff; }
    .notif-error { background: #dc2626; color: #fff; }
    .notif-warning { background: #d97706; color: #fff; }
    @media (max-width: 768px) {
      .main-layout { grid-template-columns: 1fr; }
      .betslip-panel { position: fixed; bottom: 0; right: 0; left: 0; height: auto; max-height: 50vh; border-left: none; border-top: 1px solid #e8ecf0; z-index: 50; }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  'use strict';

  const state = {
    races: [], selectedRace: null, tab: 'all',
    bets: [], stats: {}, loading: true, notif: null
  };

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(n) { return parseFloat(n).toFixed(2); }
  function getTimeLabel(race) {
    if (race.status === 'live') return '&#128308; LIVE NOW';
    if (race.status === 'finished') return '&#9989; Finished';
    const diff = new Date(race.start_time) - new Date();
    if (diff < 0) return 'Starting...';
    const mins = Math.floor(diff / 60000);
    return mins < 60 ? 'In ' + mins + 'm' : 'In ' + Math.floor(mins/60) + 'h ' + (mins%60) + 'm';
  }

  async function apiFetch(path, opts) {
    opts = opts || {};
    const r = await fetch(path, Object.assign({ headers: {'Content-Type':'application/json'} }, opts));
    if (!r.ok) { const e = await r.json().catch(()=>({error:'Request failed'})); throw e; }
    return r.json();
  }

  // ── Build HTML ──────────────────────────────────────────────────

  function buildHeader() {
    const s = state.stats;
    return '<header class="header">' +
      '<div class="header-brand">' +
        '<span class="header-logo">&#127942;</span>' +
        '<h1 class="header-title">EdgeBet <span>Pro</span></h1>' +
        (s.live_races > 0 ? '<span class="live-badge">&#128308; ' + s.live_races + ' Live</span>' : '') +
      '</div>' +
      '<div class="header-stats">' +
        '<div class="hstat"><div class="hstat-v">' + (s.total_races||0) + '</div><div class="hstat-l">Races</div></div>' +
        '<div class="hstat"><div class="hstat-v">' + (s.total_bets||0) + '</div><div class="hstat-l">Bets</div></div>' +
        '<div class="hstat"><div class="hstat-v">$' + ((s.total_wagered||0)|0) + '</div><div class="hstat-l">Wagered</div></div>' +
      '</div>' +
    '</header>';
  }

  function buildStatsBar() {
    const s = state.stats;
    const items = [
      ['&#127937;', s.total_races||0, 'Total Races'],
      ['&#128308;', s.live_races||0, 'Live Now'],
      ['&#128021;', s.dog_races||0, 'Dog Races'],
      ['&#127950;', s.horse_races||0, 'Horse Races'],
      ['&#127919;', s.total_bets||0, 'Bets Placed'],
      ['&#128176;', '$'+((s.total_wagered||0)|0), 'Total Wagered'],
    ];
    return '<div class="stats-bar">' + items.map(function(item) {
      return '<div class="stat-item"><span class="stat-icon">' + item[0] + '</span>' +
        '<div class="stat-info"><span class="stat-value">' + item[1] + '</span>' +
        '<span class="stat-label">' + item[2] + '</span></div></div>';
    }).join('') + '</div>';
  }

  function buildTabs() {
    var tabs = [['all','&#127937; All Races'],['dog','&#128021; Dog Racing'],['horse','&#127950; Horse Racing']];
    return '<div class="tabs">' + tabs.map(function(t) {
      return '<button class="tab-btn' + (state.tab===t[0]?' active':'') + '" data-tab="' + t[0] + '">' + t[1] + '</button>';
    }).join('') + '</div>';
  }

  function buildRaceList() {
    if (state.loading) return '<div class="loading"><div class="spinner"></div><p style="color:#6b7280">Loading races...</p></div>';
    if (!state.races.length) return '<div class="loading"><p style="color:#6b7280;font-size:16px">No races found.</p></div>';
    return '<div class="race-grid">' + state.races.map(function(r) {
      var statusLabel = r.status==='live' ? '&#128308; LIVE' : r.status==='upcoming' ? '&#9200; Upcoming' : '&#9989; Finished';
      var typeLabel = r.race_type==='dog' ? '&#128021; Dog' : '&#127950; Horse';
      return '<div class="race-card" data-raceid="' + r.id + '">' +
        '<div class="race-card-header">' +
          '<span class="type-badge">' + typeLabel + '</span>' +
          '<span class="status-badge status-' + r.status + '">' + statusLabel + '</span>' +
        '</div>' +
        '<div class="race-card-body">' +
          '<h3 class="race-name">' + esc(r.name) + '</h3>' +
          '<div class="race-meta">' +
            '<span class="meta-item">&#128205; ' + esc(r.track) + '</span>' +
            '<span class="meta-item">&#128207; ' + esc(r.distance) + '</span>' +
            '<span class="meta-item">&#128062; ' + (r.participant_count||0) + ' runners</span>' +
          '</div>' +
          '<div style="font-size:13px;font-weight:600;color:' + (r.status==='live'?'#dc2626':'#374151') + '">' + getTimeLabel(r) + '</div>' +
        '</div>' +
        '<div class="race-card-footer">' +
          '<span class="prize">&#128176; Prize: $' + parseFloat(r.prize_pool).toLocaleString() + '</span>' +
          '<button class="view-btn" data-raceid="' + r.id + '">View Odds &#8594;</button>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  function buildRaceDetail() {
    var race = state.selectedRace;
    var finished = race.status === 'finished';
    var ps = (race.participants||[]).slice().sort(function(a,b){ return a.number - b.number; });
    var isHorse = race.race_type === 'horse';
    var statusLabel = race.status==='live' ? '&#128308; LIVE' : race.status==='upcoming' ? '&#9200; Upcoming' : '&#9989; Finished';
    return '<div class="race-detail">' +
      '<div class="detail-header">' +
        '<button class="back-btn" id="backBtn">&#8592; Back</button>' +
        '<h2 class="detail-title">' + esc(race.name) + '</h2>' +
        '<div class="detail-meta">' +
          '<span>' + (isHorse?'&#127950; Horse Racing':'&#128021; Dog Racing') + '</span>' +
          '<span>&#128205; ' + esc(race.track) + '</span>' +
          '<span>&#128207; ' + esc(race.distance) + '</span>' +
          '<span>&#128176; $' + parseFloat(race.prize_pool).toLocaleString() + '</span>' +
          '<span class="status-badge status-' + race.status + '">' + statusLabel + '</span>' +
        '</div>' +
      '</div>' +
      '<table class="ptable"><thead><tr>' +
        '<th>#</th><th>Name</th>' + (isHorse?'<th>Jockey</th>':'') +
        '<th>Trainer</th><th>Form</th><th>Odds</th>' +
        '<th>' + (finished?'Result':'Bet') + '</th>' +
      '</tr></thead><tbody>' +
      ps.map(function(p) {
        var medal = p.position===1?'&#127947;':p.position===2?'&#129352;':p.position===3?'&#129353;':'#'+p.position;
        var betOrResult = finished
          ? (p.position ? '<span>' + medal + '</span>' : '&mdash;')
          : '<button class="bet-btn" data-pid="' + p.id + '" data-pname="' + esc(p.name) + '" data-pnum="' + p.number + '" data-odds="' + p.odds + '" data-racename="' + esc(race.name) + '" data-raceid="' + race.id + '">+ Bet</button>';
        return '<tr>' +
          '<td><span class="pnum">' + p.number + '</span></td>' +
          '<td><div class="pname">' + esc(p.name) + '</div>' +
            (p.age ? '<div style="font-size:11px;color:#9ca3af">Age: '+p.age+(p.weight?' &middot; '+p.weight:'')+'</div>' : '') +
          '</td>' +
          (isHorse ? '<td style="font-size:13px">' + esc(p.jockey||'—') + '</td>' : '') +
          '<td style="font-size:13px">' + esc(p.trainer||'—') + '</td>' +
          '<td><span class="form">' + esc(p.form||'—') + '</span></td>' +
          '<td><span class="odds">' + fmt(p.odds) + '</span></td>' +
          '<td>' + betOrResult + '</td>' +
        '</tr>';
      }).join('') +
      '</tbody></table></div>';
  }

  function buildBetSlip() {
    var bets = state.bets;
    var totalStake = bets.reduce(function(s,b){ return s+(parseFloat(b.amount)||0); }, 0);
    var totalPot   = bets.reduce(function(s,b){ return s+((parseFloat(b.amount)||0)*parseFloat(b.odds)); }, 0);
    var inner = !bets.length
      ? '<div class="empty-bs"><div class="empty-icon">&#127919;</div>' +
        '<div style="font-size:14px;font-weight:500">Your bet slip is empty</div>' +
        '<div style="font-size:12px;margin-top:6px">Click &quot;Bet&quot; on any runner to add</div></div>'
      : bets.map(function(b) {
          var pot = b.amount && parseFloat(b.amount)>0
            ? '<div class="pot-win">&#128176; Potential: $'+(parseFloat(b.amount)*parseFloat(b.odds)).toFixed(2)+'</div>'
            : '';
          return '<div class="bet-item" id="bet-'+b.id+'">' +
            '<div class="bi-header">' +
              '<div>' +
                '<div class="bi-pname">#'+b.num+' '+esc(b.name)+'</div>' +
                '<div class="bi-race">'+esc(b.raceName)+'</div>' +
              '</div>' +
              '<button class="rm-btn" data-removeid="'+b.id+'">&times;</button>' +
            '</div>' +
            '<div class="bi-odds">Odds: '+fmt(b.odds)+'</div>' +
            '<select class="btype-sel" data-typeid="'+b.id+'">' +
              '<option value="win"'+(b.betType==='win'?' selected':'')+'>Win</option>' +
              '<option value="place"'+(b.betType==='place'?' selected':'')+'>Place</option>' +
              '<option value="each_way"'+(b.betType==='each_way'?' selected':'')+'>Each Way</option>' +
            '</select>' +
            '<input type="number" class="bamount" placeholder="Amount ($)" min="1" value="'+esc(b.amount)+'" data-amtid="'+b.id+'" />' +
            '<div class="quick-btns">' +
              [10,20,50,100].map(function(a){ return '<button class="qbtn" data-qamt="'+a+'" data-qid="'+b.id+'">$'+a+'</button>'; }).join('') +
            '</div>' +
            pot +
            '<button class="place-btn" data-placeid="'+b.id+'">Place Bet</button>' +
          '</div>';
        }).join('') +
        (bets.length>1
          ? '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;margin-top:8px">' +
            '<div style="font-size:13px;color:#374151;margin-bottom:4px"><strong>Total Stake:</strong> $'+totalStake.toFixed(2)+'</div>' +
            '<div style="font-size:13px;color:#059669;font-weight:700"><strong>Total Potential:</strong> $'+totalPot.toFixed(2)+'</div>' +
            '</div>' : '');
    return '<div class="bet-slip"><div class="bs-title">&#127920; Bet Slip ' +
      (bets.length>0?'<span class="bet-cnt">'+bets.length+'</span>':'') +
    '</div>' + inner + '</div>';
  }

  function buildNotif() {
    if (!state.notif) return '';
    return '<div class="notif notif-'+state.notif.type+'">'+esc(state.notif.msg)+'</div>';
  }

  // ── Render ───────────────────────────────────────────────────────

  function render() {
    var activeAmtId = null, selStart = 0, selEnd = 0;
    var ae = document.activeElement;
    if (ae && ae.dataset && ae.dataset.amtid) {
      activeAmtId = ae.dataset.amtid;
      selStart = ae.selectionStart; selEnd = ae.selectionEnd;
    }

    var html = '<div class="app">' +
      buildHeader() + buildStatsBar() + buildNotif() +
      '<div class="main-layout">' +
        '<div class="races-panel">' + buildTabs() +
          (state.selectedRace ? buildRaceDetail() : buildRaceList()) +
        '</div>' +
        '<div class="betslip-panel">' + buildBetSlip() + '</div>' +
      '</div></div>';

    document.getElementById('root').innerHTML = html;
    attachEvents();

    if (activeAmtId) {
      var inp = document.querySelector('[data-amtid="'+activeAmtId+'"]');
      if (inp) { inp.focus(); try { inp.setSelectionRange(selStart, selEnd); } catch(e){} }
    }
  }

  function renderBetSlipOnly() {
    var panel = document.querySelector('.betslip-panel');
    if (!panel) { render(); return; }
    var activeAmtId = null, selStart = 0, selEnd = 0;
    var ae = document.activeElement;
    if (ae && ae.dataset && ae.dataset.amtid) {
      activeAmtId = ae.dataset.amtid;
      selStart = ae.selectionStart; selEnd = ae.selectionEnd;
    }
    panel.innerHTML = buildBetSlip();
    attachBetSlipEvents();
    if (activeAmtId) {
      var inp = document.querySelector('[data-amtid="'+activeAmtId+'"]');
      if (inp) { inp.focus(); try { inp.setSelectionRange(selStart, selEnd); } catch(e){} }
    }
  }

  // ── Events ───────────────────────────────────────────────────────

  function attachEvents() {
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.tab = btn.dataset.tab;
        state.selectedRace = null;
        loadRaces();
      });
    });

    document.querySelectorAll('.race-card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (!e.target.classList.contains('view-btn')) {
          loadRaceDetail(card.dataset.raceid);
        }
      });
    });
    document.querySelectorAll('.view-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        loadRaceDetail(btn.dataset.raceid);
      });
    });

    var backBtn = document.getElementById('backBtn');
    if (backBtn) backBtn.addEventListener('click', function() { state.selectedRace = null; render(); });

    document.querySelectorAll('.bet-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        addBet(parseInt(btn.dataset.pid), btn.dataset.pname, parseInt(btn.dataset.pnum),
               parseFloat(btn.dataset.odds), btn.dataset.racename, parseInt(btn.dataset.raceid));
      });
    });

    attachBetSlipEvents();
  }

  function attachBetSlipEvents() {
    document.querySelectorAll('.rm-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { removeBet(parseInt(btn.dataset.removeid)); });
    });
    document.querySelectorAll('.bamount').forEach(function(inp) {
      inp.addEventListener('input', function() { updateAmount(parseInt(inp.dataset.amtid), inp.value); });
    });
    document.querySelectorAll('.qbtn').forEach(function(btn) {
      btn.addEventListener('click', function() { updateAmount(parseInt(btn.dataset.qid), btn.dataset.qamt); });
    });
    document.querySelectorAll('.btype-sel').forEach(function(sel) {
      sel.addEventListener('change', function() { updateType(parseInt(sel.dataset.typeid), sel.value); });
    });
    document.querySelectorAll('.place-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var bet = state.bets.find(function(b){ return b.id === parseInt(btn.dataset.placeid); });
        if (bet) doPlaceBet(bet);
      });
    });
  }

  // ── State mutations ──────────────────────────────────────────────

  function addBet(pid, pname, pnum, odds, raceName, raceId) {
    if (state.bets.find(function(b){ return b.participantId === pid; })) {
      notify('Already in slip!', 'warning'); return;
    }
    state.bets.push({ id: Date.now(), participantId: pid, name: pname, num: pnum, raceName: raceName, raceId: raceId, odds: odds, amount: '', betType: 'win' });
    notify(pname + ' added!', 'success');
    render();
  }

  function removeBet(id) {
    state.bets = state.bets.filter(function(b){ return b.id !== id; });
    renderBetSlipOnly();
  }

  function updateAmount(id, val) {
    state.bets = state.bets.map(function(b){ return b.id===id ? Object.assign({},b,{amount:val}) : b; });
    renderBetSlipOnly();
  }

  function updateType(id, val) {
    state.bets = state.bets.map(function(b){ return b.id===id ? Object.assign({},b,{betType:val}) : b; });
    renderBetSlipOnly();
  }

  async function doPlaceBet(bet) {
    if (!bet.amount || parseFloat(bet.amount) <= 0) { notify('Enter a valid amount!', 'error'); return; }
    try {
      await apiFetch('/api/bets/', {
        method: 'POST',
        body: JSON.stringify({ participant: bet.participantId, amount: parseFloat(bet.amount), bet_type: bet.betType, bettor_name: 'Guest' })
      });
      state.bets = state.bets.filter(function(b){ return b.id !== bet.id; });
      notify('Bet placed on ' + bet.name + '!', 'success');
      fetchStats();
      render();
    } catch(e) { notify((e && e.error) || 'Failed to place bet', 'error'); }
  }

  var notifTimer = null;
  function notify(msg, type) {
    state.notif = { msg: msg, type: type };
    var notifEl = document.querySelector('.notif');
    if (notifEl) { notifEl.remove(); }
    var el = document.createElement('div');
    el.className = 'notif notif-' + type;
    el.textContent = msg;
    document.body.appendChild(el);
    if (notifTimer) clearTimeout(notifTimer);
    notifTimer = setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); state.notif = null; }, 3000);
  }

  // ── Data loading ─────────────────────────────────────────────────

  async function loadRaces() {
    state.loading = true;
    state.races = [];
    render();
    try {
      var url = '/api/races/?page_size=50';
      if (state.tab === 'dog') url += '&type=dog';
      if (state.tab === 'horse') url += '&type=horse';
      var d = await apiFetch(url);
      state.races = d.results || d;
    } catch(e) {}
    state.loading = false;
    render();
  }

  async function loadRaceDetail(id) {
    try {
      var d = await apiFetch('/api/races/' + id + '/');
      state.selectedRace = d;
      render();
    } catch(e) {}
  }

  async function fetchStats() {
    try {
      var d = await apiFetch('/api/races/stats/');
      state.stats = d;
      var hdr = document.querySelector('.header');
      if (hdr) {
        hdr.outerHTML = buildHeader();
      }
      var sb = document.querySelector('.stats-bar');
      if (sb) {
        var tmp = document.createElement('div');
        tmp.innerHTML = buildStatsBar();
        sb.parentNode.replaceChild(tmp.firstChild, sb);
      }
    } catch(e) {}
  }

  // ── Boot ─────────────────────────────────────────────────────────
  render();
  loadRaces();
  fetchStats();

})();
</script>
</body>
</html>
