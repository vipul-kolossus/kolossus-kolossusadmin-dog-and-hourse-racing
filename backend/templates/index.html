<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EdgeBet Pro - Racing Betting</title>
    <script>
      // Inject the static files path for React
      window.STATIC_URL = "{{ STATIC_URL }}";
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    {% load static %}
    <script>
      // Load React bundle from static files
      var scripts = document.querySelectorAll('script[src]');
    </script>
    <!-- React build files will be served from /static/react/ -->
    <link href="{% static 'react/static/css/main.css' %}" rel="stylesheet" onerror="console.log('CSS not found')">
    <script src="{% static 'react/static/js/main.js' %}" onerror="document.getElementById('root').innerHTML='<div style=padding:40px;text-align:center;font-family:sans-serif><h2>Loading...</h2><p>App is initializing. Please refresh in a moment.</p></div>'"></script>
  </body>
</html>
